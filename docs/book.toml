[book]
title = "Velstra Sentinel"
description = "Building, installing, and operating the Velstra Sentinel immutable firewall/router appliance OS."
authors = ["Velstra"]
language = "en"
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Velstra/sentinel"
edit-url-template = "https://github.com/Velstra/sentinel/edit/main/docs/{path}"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true

[output.html.playground]
runnable = false
