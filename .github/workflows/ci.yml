name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Nightly: run the FULL `nix flake check` (all ~40 VM tests). This is the
    # exhaustive integration proof; the per-PR job below runs only a curated
    # subset so pushes stay fast.
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast gate: formatting, lints, unit/integration tests, release build. Runs on
  # every push/PR and does NOT need KVM.
  check:
    name: fmt, clippy, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # No system protoc needed: velstra-proto vendors its own.
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release

  # Integration proof: the nixosTests boot real VMs and exercise the appliance
  # end-to-end, so they genuinely need hardware virtualization. GitHub-hosted
  # `ubuntu-24.04` runners expose /dev/kvm (nested virt), which the Nix VM tests
  # use. We run a curated, representative subset in a matrix so the legs run in
  # parallel and the job stays reasonable on every PR.
  #
  # To add more coverage per-PR, append the check's attrname (from
  # `checks.x86_64-linux.<name>` in flake.nix) to the matrix below. The complete
  # set (~40 tests) runs nightly via the `flake-check-full` job, or locally with
  # `nix flake check -L`.
  nixos-tests:
    name: "nixosTest: ${{ matrix.check }}"
    # Skip on the nightly schedule — the full run below covers everything.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Curated cross-section: commit pipeline, reboot persistence, the REST
        # API, on-box PKI, DNS, LLDP, one routing protocol (BGP), and NAT64.
        # Every name here is a real `checks.x86_64-linux.<name>` attribute.
        check:
          - commit
          - reboot
          - api
          - pki
          - dns
          - lldp
          - bgp
          - nat64
    steps:
      - uses: actions/checkout@v4
      # nixosTests build a full NixOS VM (kernel + qemu + system closure), which
      # needs far more than a stock runner's free disk. Reclaim the space the
      # hosted image wastes on toolchains we don't use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          df -h /
      # Hard requirement: without /dev/kvm the VM tests can't boot. Fail loudly
      # rather than silently skipping — a "green" run without KVM proves nothing.
      - name: Verify KVM is available
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is missing — nixosTests require hardware virtualization."
            exit 1
          fi
          ls -l /dev/kvm
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
      # No magic-nix-cache: nixosTest closures are multi-GB and 8 matrix legs
      # exhaust the GitHub Actions cache rate limit (HTTP 418). nix pulls from
      # cache.nixos.org directly instead.
      - name: "nix build .#checks.x86_64-linux.${{ matrix.check }}"
        run: nix build -L ".#checks.x86_64-linux.${{ matrix.check }}"

  # Nightly exhaustive run: every check in the flake. Only fires on the cron
  # schedule so it never blocks a PR.
  flake-check-full:
    name: full nix flake check (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          df -h /
      - name: Verify KVM is available
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is missing — nixosTests require hardware virtualization."
            exit 1
          fi
          ls -l /dev/kvm
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
      # No magic-nix-cache (GitHub Actions cache rate limit at nixosTest scale).
      - run: nix flake check -L
