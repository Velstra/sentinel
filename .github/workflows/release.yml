name: Release

# When a `vX.Y.Z` tag is pushed (by `cargo release`), publish a GitHub release
# whose body IS that version's CHANGELOG section — so every GitHub release points
# straight at the release notes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Everything between `## [<version>]` and the next `## [` heading.
          awk -v v="$version" '
            $0 ~ ("^## \\[" v "\\]") { inblock = 1; next }
            inblock && /^## \[/ { exit }
            inblock { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          {
            echo
            echo "---"
            echo "Full changelog: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)"
          } >> RELEASE_NOTES.md
          echo "----- release notes for $version -----"
          cat RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
